<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go Student | Admin Documents</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="go-student-layout">
<button id="sidebarReopen" type="button" class="sidebar-reopen-btn" aria-label="Afficher le menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">GS</div>
      <div>
        <h1>Go Student</h1>
        <p>Admin panel</p>
      </div>
      <button id="sidebarToggle" type="button" class="sidebar-toggle-btn" aria-label="Réduire le menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
    <nav class="side-nav">
      <a href="index.html" class="nav-item">Accueil</a>
      <a href="admin-dashboard.html" class="nav-item">Admin Dashboard</a>
      <a href="admin-wallet.html" class="nav-item">Admin Wallet</a>
      <a href="admin-documents.html" class="nav-item is-active">Documents & Validation</a>
      <a href="admin-users.html" class="nav-item">Users Table</a>
      <a href="receipt.html" class="nav-item">Reçu</a>
      <a href="#" id="logoutNav" class="nav-item">Deconnexion</a>
    </nav>
    <div class="sidebar-user">
      <div class="avatar-chip">AD</div>
      <div>
        <strong>Admin</strong>
        <p>Go Student</p>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="main-header">
      <div>
        <h2>Documents & Validation</h2>
        <p id="adminInfo">Loading admin profile...</p>
      </div>
      <div class="header-actions admin-actions">
        <div class="notif-bell-wrap">
          <button id="notifBellButton" type="button" class="notif-bell-btn" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span id="notifBellBadge" class="notif-badge" style="display: none;">0</span>
          </button>
          <div id="notifPanel" class="notif-panel">
            <div class="notif-panel-header">
              <h4>Notifications</h4>
              <div class="notif-panel-actions">
                <button type="button" id="notifMarkAllRead" class="notif-text-btn">Tout marquer lu</button>
                <button type="button" id="notifClearAll" class="notif-text-btn">Tout effacer</button>
              </div>
            </div>
            <div id="notifList" class="notif-list">
              <p class="notif-empty">Chargement...</p>
            </div>
          </div>
        </div>

        <a href="admin-dashboard.html" class="btn btn-secondary">Dashboard</a>
        <a href="admin-wallet.html" class="btn btn-secondary">Wallet</a>
        <a href="admin-users.html" class="btn btn-secondary">Users</a>
        <button id="logoutButton" class="btn btn-secondary">Logout</button>
      </div>
    </header>

    <section id="documentsValidationSection" class="card wallet-history-card">
      <h3>Documents and Accounts Validation</h3>
      <div id="adminPendingDocs" class="history-list">
        <p class="small-text">Loading documents...</p>
      </div>
      <div id="adminUsersMessage" class="message"></div>
    </section>
  </main>
  <script src="js/main.js"></script>
</body>
</html>
