<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoStudent | Nouveau mot de passe</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-split-page">
  <main class="auth-shell">
    <section class="auth-left-panel">
      <div class="auth-panel-content">
        <a href="index.html" class="auth-logo-wrap" aria-label="GoStudent accueil">
          <img src="assets/gostudent-auth-logo.png" alt="GoStudent" />
        </a>
        <div class="auth-panel-headline">
          <h1 data-i18n="auth.hero.title">Voyagez.
Economisez.
Reussissez.</h1>
          <p data-i18n="auth.hero.subtitle">Rejoignez des milliers d'etudiants qui voyagent malin a travers le Maroc.</p>
        </div>
      </div>
    </section>

    <section class="auth-right-panel">
      <div class="auth-form-box">
        <div class="auth-tabs">
          <a class="auth-tab active" href="reset-password.html" data-i18n="reset.title">Nouveau mot de passe</a>
          <a class="auth-tab" href="login.html" data-i18n="nav.login">Connexion</a>
        </div>

        <div class="auth-form-heading">
          <h2 data-i18n="reset.heading">Choisir un nouveau mot de passe</h2>
          <p data-i18n="reset.subheading">Votre lien expire apres 30 minutes.</p>
        </div>

        <form id="resetPasswordForm" class="auth-modern-form">
          <div class="auth-field">
            <label for="resetPassword" data-i18n="reset.password">Nouveau mot de passe</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon">#</span>
              <input type="password" id="resetPassword" placeholder="Min. 6 caracteres" data-i18n-placeholder="reset.password.placeholder" minlength="6" required />
            </div>
          </div>

          <div class="auth-field">
            <label for="resetConfirmPassword" data-i18n="reset.confirm">Confirmer le mot de passe</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon">#</span>
              <input type="password" id="resetConfirmPassword" placeholder="Repetez le mot de passe" data-i18n-placeholder="reset.confirm.placeholder" minlength="6" required />
            </div>
          </div>

          <button type="submit" class="auth-submit-btn" data-i18n="reset.button">Reinitialiser</button>
          <p class="auth-terms"><a href="login.html" data-i18n="forgot.back">Retour a la connexion</a></p>
        </form>

        <div id="resetPasswordMessage" class="message"></div>
        <div class="auth-lang-row">
          <button id="lang-en" onclick="setLanguage('en')">GB</button>
          <button id="lang-fr" onclick="setLanguage('fr')">FR</button>
          <button id="lang-ar" onclick="setLanguage('ar')">MA</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/translations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
